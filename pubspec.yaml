name: fast_hostel_system
description: A fast and modern hostel management system for university students

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  firebase_messaging: ^16.0.4
  firebase_app_check: ^0.4.1+2
  
  # Cloudinary
  cloudinary_flutter: ^1.0.0
  
  # Environment variables
  flutter_dotenv: ^5.1.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Routing
  go_router: ^12.1.3
  
  # UI & Charts
  google_fonts: ^6.1.0
  flutter_local_notifications: ^19.0.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  file_picker: ^8.1.2
  url_launcher: ^6.2.2
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  
  # Utils
  intl: ^0.19.0
  path: ^1.9.0
  cross_file: ^0.3.4+2
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  # Form validation
  email_validator: ^2.1.17
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
